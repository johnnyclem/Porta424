name: Porta424
options:
  bundleIdPrefix: com.porta424
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_NSMicrophoneUsageDescription: "Porta424 uses the microphone to process audio through the tape emulation DSP."
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortrait"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_UIRequiresFullScreen: YES
    INFOPLIST_KEY_CFBundleDisplayName: "Porta424"
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.music"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: GV49AHY2S2
    CODE_SIGN_IDENTITY: "Apple Development"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    CLANG_CXX_LANGUAGE_STANDARD: "gnu++17"
    CLANG_ENABLE_MODULES: YES
    SWIFT_STRICT_CONCURRENCY: complete

packages:
  PortaDSPKit:
    path: ../Packages/PortaDSPKit
  Porta424AudioEngine:
    path: ../Packages/Porta424AudioEngine

targets:
  Porta424:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
        excludes:
          - Info.plist
          - Info-macOS.plist
    dependencies:
      - package: PortaDSPKit
        product: PortaDSPKit
      - package: Porta424AudioEngine
        product: Porta424AudioEngine
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.porta424.app
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        # Prefer modern SDKs when present (iOS 26/27 toolchain).
        SDKROOT: iphoneos
        ONLY_ACTIVE_ARCH: YES
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Porta424
        NSMicrophoneUsageDescription: Porta424 uses the microphone to process audio through the tape emulation DSP.
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortrait
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiresFullScreen: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false

  Porta424Mac:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources
        excludes:
          - Info.plist
          - Info-macOS.plist
    dependencies:
      - package: PortaDSPKit
        product: PortaDSPKit
      - package: Porta424AudioEngine
        product: Porta424AudioEngine
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.porta424.app.mac
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Porta424 uses the microphone to process audio through the tape emulation DSP."
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        COMBINE_HIDPI_IMAGES: YES
    info:
      path: Sources/Info-macOS.plist
      properties:
        CFBundleDisplayName: Porta424
        NSMicrophoneUsageDescription: Porta424 uses the microphone to process audio through the tape emulation DSP.
        NSPrincipalClass: NSApplication
        LSMinimumSystemVersion: "14.0"

schemes:
  Porta424:
    build:
      targets:
        Porta424: all
    run:
      config: Debug
      storeKitConfiguration: ""
  Porta424Mac:
    build:
      targets:
        Porta424Mac: all
    run:
      config: Debug
