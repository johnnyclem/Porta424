name: CI

on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  linux:
    name: Linux (Swift 5.9)
    runs-on: ubuntu-latest
    # Use the official Swift toolchain image instead of swift-actions/setup-swift,
    # which is unmaintained and now fails on current runners (no Ubuntu 24.04
    # support, and a broken GPG key-import step on 22.04).
    container: swift:5.9
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build --build-tests
      - name: Test
        run: swift test

  macos:
    name: macOS (macos-latest)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build --build-tests
      - name: Test
        run: swift test
